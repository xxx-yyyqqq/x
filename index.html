<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>是男人就坚持30秒 - 游戏首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 是男人就坚持30秒 🎮</h1>
        <p>终极挑战版</p>
        <a href="game.html" class="btn">开始游戏</a>
        
        <div class="info">
            <p><strong>🎮 游戏说明</strong></p>
            <p>⬆️⬇️⬅️➡️ 方向键或 WASD 控制移动</p>
            <p>🚫 躲避红色障碍物（直线飞行，碰壁反弹）</p>
            <p>📊 障碍物最多30个，速度持续增加</p>
            <p>⏱️ 坚持 30 秒达成基础目标</p>
            <p>🏆 全球在线排行榜，与好友PK！</p>
            <p style="margin-top: 15px; color: #f44336;"><strong>💡 技巧提示：</strong></p>
            <p>预判障碍物轨迹，利用反弹规律走位！</p>
        </div>
    </div>
</body>
</html>
