<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>是男人就坚持30秒 - 游戏首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
    <script>
        // 自动跳转到游戏页面
        window.onload = function() {
            setTimeout(function() {
                window.location.href = '/game-static.html';
            }, 2000);
        };
    </script>
</head>
<body>
    <div class="container">
        <h1>🎮 是男人就坚持30秒 🎮</h1>
        <p>终极挑战版</p>
        <p style="color: #ff6b35; font-weight: bold;">正在跳转到游戏...</p>
        <a href="/game-static.html" class="btn">立即开始</a>
        
        <div class="info">
            <p><strong>游戏说明：</strong></p>
            <p>⬆️⬇️⬅️➡️ 方向键或 WASD 移动</p>
            <p>🚫 躲避红色障碍物</p>
            <p>⏱️ 坚持 30 秒达成基础目标</p>
            <p>🏆 本地排行榜</p>
        </div>
    </div>
</body>
</html>
